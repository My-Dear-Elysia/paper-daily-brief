<body>
  <header>
    <h1><a href="/">苏菲的工房</a></h1>
    <nav>
      <a href="/">首页</a>

  <script>(()=>{const k='theme-pref';const t=document.getElementById('theme-toggle');const s='<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';const m='<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';function a(){const p=localStorage.getItem(k)||'dark';document.documentElement.setAttribute('data-theme',p);if(t)t.innerHTML=p==='dark'?m:s}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',a)}else{a()}document.addEventListener('click',e=>{if(e.target.closest('#theme-toggle')){const c=localStorage.getItem(k)||'dark';const n=c==='dark'?'light':'dark';localStorage.setItem(k,n);a()}})})();</script>
</body>
</html>
