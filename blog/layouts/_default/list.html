<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.ico?v=2">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/theme.js"></script>
</head>
<body>
  <header>
    <h1><a href="/">{{ .Site.Title }}</a></h1>
    <nav>
      <a href="/">首页</a>
      <a href="/posts">博客</a>
      <a href="/reports">定期报告</a>
      <a href="/thoughts">随想</a>
      <a href="/methods">方法</a>
      <a href="/about">关于</a>
      <span class="theme-switch">
        <a onclick="__setTheme('light')" id="t-light">浅色</a>
        <a onclick="__setTheme('dark')" id="t-dark">深色</a>
        <a onclick="__setTheme('system')" id="t-system">自动</a>
      </span>
    </nav>
  </header>
  <main>
    <h2>{{ .Title }}</h2>
    <ul>
    {{ range .Pages }}
      <li><a href="{{ .RelPermalink }}">{{ .Title }}</a> — <time>{{ .Date.Format "2006-01-02" }}</time></li>
    {{ end }}
    </ul>
  </main>
  <footer>
    <p>© {{ now.Year }} {{ .Site.Title }}</p>
  </footer>
</body>
</html>
