<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="武汉大学临床医学八年制，医学 AI。">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="武汉大学临床医学八年制，医学 AI。">
  <meta property="og:url" content="{{ .Permalink }}">
  <link rel="icon" href="/favicon.ico?v=2">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1><a href="/">{{ .Site.Title }}</a></h1>
    <nav>
      <a href="/">首页</a>
      <a href="/posts">博客</a>
      <a href="/methods">方法</a>
      <a href="/reports">定期报告</a>
      <a href="/thoughts">随想</a>
      <a href="/about">关于</a>
      <span class="theme-switch">
        <span id="theme-toggle" title="切换亮暗">🌙</span>
      </span>
    </nav>
  </header>
  <main>
    <article>
      <h2>{{ .Title }}</h2>
      <time>{{ .Date.Format "2006-01-02" }}</time>
      {{ .Content }}
    </article>
  </main>
  <footer>
    <p>© {{ now.Year }} {{ .Site.Title }}</p>
  </footer>
  <script src="/js/theme.js"></script>
</body>
</html>
